const catLabels={root:"Start",ekvationer:"Ekvationer",regression:"Regression",funktioner:"Funktioner",logaritmer:"Logaritmer"};

const tree={root:{ekvationer:{andragradsekvationer:{pqform:{},kvadratkomplettering:{},pqformeln:{}},rotekvationer:{rotmetod:{},falskrot:{},kontroll:{}},exponentialekvation:{},potensekvation:{}},funktioner:{andragradsfunktioner:{koefficienten_a:{a_positiv:{},a_negativ:{},bredd:{}},symmetrilinje:{},extrempunkt:{},nollstallen:{noll_tva:{},noll_ett:{},noll_noll:{}},faktorform:{},tillampningar:{}},exponentialfunktioner:{forandringsfaktor:{},startvarde:{}},potensfunktion:{}},regression:{regressionsanalys:{},modellval:{},modelltyper:{}},logaritmer:{definition_lg:{},tiologaritm:{},logaritmlagar:{produktregeln:{},kvotregeln:{},potensregeln:{}}}}};

// ═══════════════════
//  STATE
// ═══════════════════
let cur='root',hist=['root'],vis=new Set(['root']);
const total=Object.keys(N).length;
const CIRC=81.68; // 2*PI*13

// ═══════════════════
//  NAV
// ═══════════════════
function go(id){
  if(!N[id])return;
  const c=document.getElementById('card');
  c.classList.add('out');
  setTimeout(()=>{
    vis.add(id);cur=id;hist.push(id);
    render();
    c.classList.remove('out');c.classList.add('entering');
    requestAnimationFrame(()=>requestAnimationFrame(()=>c.classList.remove('entering')));
    window.scrollTo({top:0,behavior:'smooth'});
  },250);
}

function goBack(){
  if(hist.length<=1)return;
  const c=document.getElementById('card');
  c.classList.add('out');
  setTimeout(()=>{hist.pop();cur=hist[hist.length-1];render();
    c.classList.remove('out');c.classList.add('entering');
    requestAnimationFrame(()=>requestAnimationFrame(()=>c.classList.remove('entering')));
  },250);
}

function jumpBC(i){hist=hist.slice(0,i+1);cur=hist[hist.length-1];render()}

function jumpTo(id){
  if(!N[id])return;vis.add(id);cur=id;
  const p=findPath('root',id,tree);hist=p||[id];
  render();closeDrawer();
}
function findPath(f,t,s,p){
  p=p||[f];if(f===t)return p;
  const ch=s[f];if(!ch)return null;
  for(const k of Object.keys(ch)){const r=findPath(k,t,ch,[...p,k]);if(r)return r}
  return null;
}

// ═══════════════════
//  RENDER
// ═══════════════════
// Count descendants of a node in the tree
function countDesc(id,t){
  const ch=t[id];if(!ch)return 0;
  let c=0;for(const k of Object.keys(ch)){c+=1+countDesc(k,ch)}return c;
}
function countFor(id){return countDesc(id,findSubtree(id,tree)||{})}
function findSubtree(id,t){
  if(t[id]!==undefined)return t;
  for(const k of Object.keys(t)){const ch=t[k];if(ch){const r=findSubtree(id,ch);if(r)return r}}
  return null;
}

// Find siblings of current node
function getSiblings(id){
  const st=findSubtree(id,tree);
  if(!st)return[];
  // find parent key
  for(const k of Object.keys(st)){
    const ch=st[k];if(ch&&ch[id]!==undefined){
      return Object.keys(ch).filter(s=>s!==id);
    }
  }
  return[];
}
// Find parent of current node
function getParent(id){
  return findParent(id,tree);
}
function findParent(id,t,parent){
  for(const k of Object.keys(t)){
    if(k===id)return parent||null;
    const ch=t[k];if(ch){const r=findParent(id,ch,k);if(r)return r}
  }
  return null;
}

function fixScroll(){
  const c=document.getElementById('card');
  if(!c)return;
  const cBottom=c.getBoundingClientRect().bottom+window.scrollY;
  document.body.style.minHeight=(cBottom+300)+'px';
}

function render(){
  const n=N[cur];

  // breadcrumb
  document.getElementById('breadcrumb').innerHTML=hist.map((id,i)=>{
    const nd=N[id],last=i===hist.length-1;
    const sep=i<hist.length-1?'<span class="crumb-sep">\u25B8</span>':'';
    const lbl=id==='root'?'Start':(nd?nd.title:id);
    return `<span class="crumb${last?' active':''}"${last?'':`onclick="jumpBC(${i})"`}>${lbl}</span>${sep}`;
  }).join('');

  document.getElementById('backBtn').disabled=hist.length<=1;

  // category
  document.getElementById('cardCat').innerHTML=`<span class="card-cat cat-${n.cat}">${catLabels[n.cat]||''}</span>`;

  // title & subtitle
  document.getElementById('cardTitle').textContent=n.title;
  const sub=document.getElementById('cardSub');
  sub.textContent=n.subtitle||'';sub.style.display=n.subtitle?'block':'none';

  // body
  const bodyEl=document.getElementById('cardBody');
  bodyEl.innerHTML=n.body;
  bodyEl.style.display=n.body?'block':'none';

  // image (clickable to expand)
  const img=document.getElementById('cardImg');
  if(n.image){
    img.innerHTML=`<img src="${n.image}" alt="${n.title}" onclick="this.classList.toggle('expanded')" onload="fixScroll()" onerror="this.parentElement.style.display='none'">`;
    img.style.display='block';
  } else{img.innerHTML='';img.style.display='none'}

  // connections with depth indicator
  const cs=n.connections||[];
  const area=document.getElementById('connArea');
  const grid=document.getElementById('connGrid');
  const hasBody=!!n.body;
  // hide divider+label when no body text (e.g. root)
  area.querySelector('.conn-divider').style.display=hasBody?'':'none';
  area.querySelector('.conn-label-row').style.display=hasBody?'':'none';
  if(!cs.length){area.style.display='none'}
  else{
    area.style.display='block';
    grid.innerHTML=cs.map((c,i)=>{
      const t=N[c.to];if(!t)return'';
      const v=vis.has(c.to)?'visited':'';
      const desc=countFor(c.to);
      const badge=desc>0?` <span class="conn-depth">(${desc})</span>`:'';
      return `<button class="conn-btn ${v}" onclick="go('${c.to}')" style="animation-delay:${0.05+i*0.07}s">
        <span class="conn-name">${t.title}${badge}<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>
      </button>`;
    }).join('');
  }

  // leaf-node navigation: show siblings and parent when no connections
  const leafEl=document.getElementById('leafNav');
  if(cs.length||cur==='root'){
    leafEl.classList.remove('show');leafEl.innerHTML='';
  } else {
    const sibs=getSiblings(cur).filter(s=>s!==cur);
    const parentId=getParent(cur);
    let html='<div class="leaf-divider"></div>';
    if(sibs.length){
      html+=`<div class="leaf-label">Utforska ocks\u00e5</div><div class="leaf-grid">`;
      html+=sibs.map(s=>{
        const sn=N[s];if(!sn)return'';
        return `<button class="leaf-btn" onclick="go('${s}')">${sn.title}</button>`;
      }).join('');
      html+='</div>';
    }
    if(parentId&&N[parentId]){
      html+=`<div style="margin-top:0.7rem"><div class="leaf-label">Tillbaka till</div><div class="leaf-grid">
        <button class="leaf-btn" onclick="go('${parentId}')">\u2190 ${N[parentId].title}</button>
      </div></div>`;
    }
    leafEl.innerHTML=html;leafEl.classList.add('show');
  }


  // toggle vertical centering: center short content, top-align long content
  requestAnimationFrame(()=>{
    fixScroll();
    const card=document.getElementById('card');
    const inner=card.querySelector('.card-inner');
    const topbar=document.querySelector('.topbar');
    const availH=window.innerHeight-(topbar?topbar.offsetHeight:0);
    if(inner.scrollHeight>availH*0.6){
      card.classList.add('has-long-content');
    } else {
      card.classList.remove('has-long-content');
    }
  });
  renderMath();
  if(cur==='bredd')setTimeout(initBreddGraph,60);
  if(cur==='a_positiv')setTimeout(initAPosGraph,60);
  if(cur==='a_negativ')setTimeout(initANegGraph,60);
  if(cur==='symmetrilinje')setTimeout(initSymGraph,60);
  if(cur==='potensfunktion')setTimeout(initPotGraph,60);
  if(cur==='tillampningar'){setTimeout(initTillGraph,60);setTimeout(initTillExpGraph,60);setTimeout(initTillPotGraph,60)}
  if(cur==='exponentialfunktioner')setTimeout(initExpGraph,60);
  if(cur==='startvarde')setTimeout(initStartGraph,60);
  if(cur==='extrempunkt')setTimeout(initExtGraph,60);
  if(cur==='nollstallen')setTimeout(initNollGraph,60);
  if(cur==='noll_tva')setTimeout(initNollTvaGraph,60);
  if(cur==='noll_ett')setTimeout(initNollEttGraph,60);
  if(cur==='noll_noll')setTimeout(initNollNollGraph,60);
  if(cur==='definition_lg')setTimeout(initLgDefGraph,60);
  if(cur==='modelltyper')setTimeout(initModellGraph,60);
  if(cur==='faktorform')setTimeout(initFaktorGraph,60);
  if(cur==='pqformeln')setTimeout(initPqGraph,60);
}

// ═══════════════════

// ═══════════════════
//  DRAWER
// ═══════════════════
function openDrawer(){
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  renderTree();
}
function closeDrawer(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}
function renderTree(){
  document.getElementById('treeRoot').innerHTML=buildTree(tree,0);
}
function buildTree(s,depth){
  depth=depth||0;
  let h='';
  for(const id of Object.keys(s)){
    const n=N[id];if(!n)continue;
    let cls='tree-node';
    if(depth===0)cls+=' depth-0';
    if(id===cur)cls+=' current';else if(vis.has(id))cls+=' visited';
    h+=`<div class="tree-group"><button class="${cls}" onclick="jumpTo('${id}')">${n.title}</button>`;
    const ch=s[id];
    if(ch&&Object.keys(ch).length)h+=`<div class="tree-indent">${buildTree(ch,depth+1)}</div>`;
    h+=`</div>`;
  }
  return h;
}

// ═══════════════════
//  KEYBOARD
// ═══════════════════
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){const d=document.getElementById('drawer');if(d.classList.contains('open'))closeDrawer();else goBack();return}
  if((e.key==='o'||e.key==='O')&&document.activeElement.tagName!=='INPUT'){openDrawer();return}
  const num=parseInt(e.key);
  if(num>=1&&num<=9){const cs=N[cur].connections||[];if(num<=cs.length)go(cs[num-1].to)}
});

      delimiters:[

      ],

  }
}

function initBreddGraph(){
  var svg=document.getElementById('breddSvg');
  if(!svg)return;
  var cx=150,cy=195,sx=42,sy=18,g='';

  for(var x=-3;x<=3;x++){var px=cx+x*sx;g+='<line x1="'+px+'" y1="8" x2="'+px+'" y2="'+(cy+5)+'" stroke="var(--cream3)" stroke-width="0.5"/>';}
  for(var y=0;y<=10;y+=2){var py=cy-y*sy;g+='<line x1="'+(cx-3*sx-5)+'" y1="'+py+'" x2="'+(cx+3*sx+5)+'" y2="'+py+'" stroke="var(--cream3)" stroke-width="0.5"/>';}

  g+='<line x1="'+cx+'" y1="8" x2="'+cx+'" y2="'+(cy+5)+'" stroke="var(--ink4)" stroke-width="1.3"/>';
  // Arrows
  g+='<polygon points="'+(cx+3*sx+8)+','+cy+' '+(cx+3*sx+3)+','+(cy-3)+' '+(cx+3*sx+3)+','+(cy+3)+'" fill="var(--ink4)"/>';
  g+='<polygon points="'+cx+',8 '+(cx-3)+',13 '+(cx+3)+',13" fill="var(--ink4)"/>';
  // X labels
  for(var x=-3;x<=3;x++){if(x===0)continue;g+='<text x="'+(cx+x*sx)+'" y="'+(cy+16)+'" text-anchor="middle" fill="var(--ink5)" style="font:400 0.6rem var(--sans)">'+x+'</text>';}
  // Y labels
  for(var y=2;y<=10;y+=2){g+='<text x="'+(cx-8)+'" y="'+(cy-y*sy+4)+'" text-anchor="end" fill="var(--ink5)" style="font:400 0.6rem var(--sans)">'+y+'</text>';}
  // Axis names
  g+='<text x="'+(cx+3*sx+12)+'" y="'+(cy+5)+'" fill="var(--ink4)" style="font:italic 500 0.75rem var(--serif)">x</text>';

function drawBredd(a,idx){
  var svg=document.getElementById('breddSvg');
  if(!svg)return;
  var cx=150,cy=195,sx=42,sy=18;
  var btns=document.querySelectorAll('#breddGraph .graph-btn');
  btns.forEach(function(b,i){b.classList.toggle('active',i===idx)});
  var path=svg.querySelector('.parab');
  var lbl=svg.querySelector('.parab-label');
  if(path){path.style.opacity='0';path.style.transition='opacity 0.15s'}
  setTimeout(function(){
    var pts=[];
    for(var x=-3;x<=3;x+=0.03){
      var y=a*x*x;var svgX=cx+x*sx;var svgY=cy-y*sy;
      if(svgY<5)continue;
      pts.push((pts.length?'L':'M')+svgX.toFixed(1)+','+svgY.toFixed(1));
    }
    if(path){path.setAttribute('d',pts.join(''));path.style.transition='opacity 0.35s';path.style.opacity='1'}
    var labels=['y = 5x\u00b2','y = x\u00b2','y = 0,2x\u00b2'];
    if(lbl)lbl.textContent=labels[idx]||'';
  },160);
}

function initAPosGraph(){

  var gw=w-pad.l-pad.r,gh=h-pad.t-pad.b;
  function mx(x){return pad.l+(x-xMin)/(xMax-xMin)*gw}
  function my(y){return pad.t+(yMax-y)/(yMax-yMin)*gh}
  var gridC='#e5dfd5',axisC='#7a7268',terraC='#bf6e4a',sageC='#6a8a6f',inkC='#302b26';

  ctx.fillText('x',w-pad.r+4,my(0));
  ctx.textBaseline='top';ctx.fillText('y',mx(0)+7,pad.t);

  ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('x = 1',mx(1)+4,pad.t+2);ctx.restore();

function drawNollParabola(canvasId,fn,xMin,xMax,yMin,yMax,pts,label){
  var c=document.getElementById(canvasId);
  if(!c)return;
  var dpr=window.devicePixelRatio||1;
  var w=c.offsetWidth||400;
  var h=Math.round(w*0.65);
  c.width=w*dpr;c.height=h*dpr;
  c.style.height=h+'px';
  var ctx=c.getContext('2d');
  ctx.scale(dpr,dpr);
  var pad={l:44,r:20,t:20,b:32};
  var gw=w-pad.l-pad.r,gh=h-pad.t-pad.b;
  function mx(x){return pad.l+(x-xMin)/(xMax-xMin)*gw}
  function my(y){return pad.t+(yMax-y)/(yMax-yMin)*gh}
  var gridC='#e5dfd5',axisC='#302b26',terraC='#bf6e4a',sageC='#6a8a6f',inkC='#302b26';
  // Grid
  ctx.strokeStyle=gridC;ctx.lineWidth=0.5;
  for(var x=Math.ceil(xMin);x<=Math.floor(xMax);x++){ctx.beginPath();ctx.moveTo(mx(x),pad.t);ctx.lineTo(mx(x),h-pad.b);ctx.stroke()}
  for(var y=Math.ceil(yMin);y<=Math.floor(yMax);y+=2){ctx.beginPath();ctx.moveTo(pad.l,my(y));ctx.lineTo(w-pad.r,my(y));ctx.stroke()}
  // Axes
  ctx.strokeStyle=axisC;ctx.lineWidth=1.8;
  ctx.beginPath();ctx.moveTo(pad.l,my(0));ctx.lineTo(w-pad.r,my(0));ctx.stroke();
  ctx.beginPath();ctx.moveTo(mx(0),pad.t);ctx.lineTo(mx(0),h-pad.b);ctx.stroke();
  ctx.fillStyle=axisC;
  ctx.beginPath();ctx.moveTo(w-pad.r,my(0));ctx.lineTo(w-pad.r-8,my(0)-5);ctx.lineTo(w-pad.r-8,my(0)+5);ctx.fill();
  ctx.beginPath();ctx.moveTo(mx(0),pad.t);ctx.lineTo(mx(0)-5,pad.t+8);ctx.lineTo(mx(0)+5,pad.t+8);ctx.fill();
  // Tick labels
  ctx.fillStyle=axisC;ctx.font='700 15px Outfit,sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
  for(var x=Math.ceil(xMin);x<=Math.floor(xMax);x++){if(x!==0)ctx.fillText(x,mx(x),my(0)+6)}
  ctx.fillText('x',w-pad.r-4,my(0)+6);
  ctx.textAlign='right';ctx.textBaseline='middle';
  for(var y=2;y<=Math.floor(yMax);y+=2){ctx.fillText(y,mx(0)-8,my(y))}
  for(var y=-2;y>=Math.ceil(yMin);y-=2){ctx.fillText(y,mx(0)-8,my(y))}
  ctx.font='700 15px Outfit,sans-serif';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('y',mx(0)+10,pad.t);
  // Curve
  ctx.strokeStyle=terraC;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();var first=true;
  for(var t=xMin;t<=xMax;t+=0.02){
    var yv=fn(t);var px=mx(t),py=my(yv);
    if(py<pad.t-5||py>h-pad.b+5){first=true;continue}
    if(first){ctx.moveTo(px,py);first=false}else ctx.lineTo(px,py);
  }
  ctx.stroke();
  // Points
  pts.forEach(function(p){
    var px=mx(p.x),py=my(p.y);
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(px,py,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=terraC;ctx.beginPath();ctx.arc(px,py,4.5,0,Math.PI*2);ctx.fill();
    var tx=px+(p.ox||0);
    ctx.fillStyle=inkC;ctx.font='700 15px Outfit,sans-serif';ctx.textAlign=p.align||'center';
    ctx.textBaseline=p.dy<0?'bottom':'top';
    ctx.fillText(p.lbl,tx,py+p.dy);
    if(p.sub){ctx.fillStyle=terraC;ctx.font='700 13px Outfit,sans-serif';ctx.textAlign=p.align||'center';ctx.textBaseline=p.sdy<0?'bottom':'top';ctx.fillText(p.sub,tx,py+p.sdy)}
  });
  // Function label
  ctx.fillStyle=terraC;ctx.font='700 15px Outfit,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(label,w/2,pad.t+4);
}

}

// ─── Modelltyper: 4 kurvor i samma graf ───
function initModellGraph(){
  var c=document.getElementById('modellCanvas');
  if(!c)return;
  var dpr=window.devicePixelRatio||1;
  var w=c.offsetWidth||400;
  var h=Math.round(w*0.65);
  c.width=w*dpr;c.height=h*dpr;
  c.style.height=h+'px';
  var ctx=c.getContext('2d');
  ctx.scale(dpr,dpr);
  var xMin=-0.5,xMax=8,yMin=-2,yMax=30;
  var pad={l:40,r:80,t:16,b:28};
  var gw=w-pad.l-pad.r,gh=h-pad.t-pad.b;
  function mx(x){return pad.l+(x-xMin)/(xMax-xMin)*gw}
  function my(y){return pad.t+(yMax-y)/(yMax-yMin)*gh}
  var gridC='#e5dfd5',axisC='#302b26',inkC='#302b26';
  var colors=['#5a82b4','#6a8a6f','#bf6e4a','#8c64a0'];
  // Grid
  ctx.strokeStyle=gridC;ctx.lineWidth=0.5;
  for(var x=0;x<=8;x++){ctx.beginPath();ctx.moveTo(mx(x),pad.t);ctx.lineTo(mx(x),h-pad.b);ctx.stroke()}
  for(var y=0;y<=28;y+=5){ctx.beginPath();ctx.moveTo(pad.l,my(y));ctx.lineTo(w-pad.r,my(y));ctx.stroke()}
  // Axes
  ctx.strokeStyle=axisC;ctx.lineWidth=1.4;
  ctx.beginPath();ctx.moveTo(pad.l,my(0));ctx.lineTo(w-pad.r,my(0));ctx.stroke();
  ctx.beginPath();ctx.moveTo(mx(0),pad.t);ctx.lineTo(mx(0),h-pad.b);ctx.stroke();
  ctx.fillStyle=axisC;
  ctx.beginPath();ctx.moveTo(w-pad.r,my(0));ctx.lineTo(w-pad.r-7,my(0)-4);ctx.lineTo(w-pad.r-7,my(0)+4);ctx.fill();
  ctx.beginPath();ctx.moveTo(mx(0),pad.t);ctx.lineTo(mx(0)-4,pad.t+7);ctx.lineTo(mx(0)+4,pad.t+7);ctx.fill();
  ctx.fillStyle=axisC;ctx.font='700 13px Outfit,sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
  for(var x=1;x<=7;x++){ctx.fillText(x,mx(x),my(0)+6)}
  ctx.textAlign='right';ctx.textBaseline='middle';
  for(var y=5;y<=25;y+=5){ctx.fillText(y,mx(0)-8,my(y))}
  // 4 curves: all start near origin
  var fns=[
    {fn:function(x){return 1.8*x},label:'Linj\u00e4r',step:0.1},
    {fn:function(x){return 0.7*Math.pow(x,1.6)},label:'Potens',step:0.05},
    {fn:function(x){return 0.35*x*x},label:'Andragrad',step:0.05},
    {fn:function(x){return 0.5*Math.pow(1.65,x)-0.5},label:'Exponentiell',step:0.05}
  ];
  fns.forEach(function(f,i){
    ctx.strokeStyle=colors[i];ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();var first=true;var lastVis={x:0,y:0};
    for(var t=0;t<=8;t+=f.step){
      var yv=f.fn(t);var px=mx(t),py=my(yv);
      if(py<pad.t-5||py>h-pad.b+5){first=true;continue}
      if(first){ctx.moveTo(px,py);first=false}else ctx.lineTo(px,py);
      lastVis={px:px,py:py};
    }
    ctx.stroke();
    // Label at last visible point of curve
    if(lastVis.px){
      ctx.fillStyle=colors[i];ctx.font='700 13px Outfit,sans-serif';
      ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillText(f.label,lastVis.px+6,lastVis.py);
    }
  });
}

// ─── Faktorform: y=(x-2)(x-3) med nollställen ───
function initFaktorGraph(){
  drawNollParabola('faktorCanvas',

}

// ─── PQ-formeln: tre fall (2, 1, 0 lösningar) ───
function initPqGraph(){
  var c=document.getElementById('pqCanvas');
  if(!c)return;
  var dpr=window.devicePixelRatio||1;
  var w=c.offsetWidth||400;
  var h=Math.round(w*0.6);
  c.width=w*dpr;c.height=h*dpr;
  c.style.height=h+'px';
  var ctx=c.getContext('2d');
  ctx.scale(dpr,dpr);
  var xMin=-1.5,xMax=6,yMin=-3,yMax=6;
  var pad={l:32,r:80,t:16,b:28};
  var gw=w-pad.l-pad.r,gh=h-pad.t-pad.b;
  function mx(x){return pad.l+(x-xMin)/(xMax-xMin)*gw}
  function my(y){return pad.t+(yMax-y)/(yMax-yMin)*gh}
  var gridC='#e5dfd5',axisC='#302b26',inkC='#302b26';
  var colors=['#bf6e4a','#6a8a6f','#5a82b4'];
  // Grid
  ctx.strokeStyle=gridC;ctx.lineWidth=0.5;
  for(var x=-1;x<=5;x++){ctx.beginPath();ctx.moveTo(mx(x),pad.t);ctx.lineTo(mx(x),h-pad.b);ctx.stroke()}
  for(var y=-2;y<=5;y++){ctx.beginPath();ctx.moveTo(pad.l,my(y));ctx.lineTo(w-pad.r,my(y));ctx.stroke()}
  // Axes
  ctx.strokeStyle=axisC;ctx.lineWidth=1.4;
  ctx.beginPath();ctx.moveTo(pad.l,my(0));ctx.lineTo(w-pad.r,my(0));ctx.stroke();
  ctx.beginPath();ctx.moveTo(mx(0),pad.t);ctx.lineTo(mx(0),h-pad.b);ctx.stroke();
  ctx.fillStyle=axisC;
  ctx.beginPath();ctx.moveTo(w-pad.r,my(0));ctx.lineTo(w-pad.r-7,my(0)-4);ctx.lineTo(w-pad.r-7,my(0)+4);ctx.fill();
  ctx.beginPath();ctx.moveTo(mx(0),pad.t);ctx.lineTo(mx(0)-4,pad.t+7);ctx.lineTo(mx(0)+4,pad.t+7);ctx.fill();
  ctx.fillStyle=axisC;ctx.font='600 12px Outfit,sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
  for(var x=-1;x<=5;x++){if(x!==0)ctx.fillText(x,mx(x),my(0)+5)}
  ctx.textAlign='right';ctx.textBaseline='middle';
  for(var y=-2;y<=5;y++){if(y!==0)ctx.fillText(y,mx(0)-7,my(y))}
  // Axis names
  ctx.fillStyle=inkC;ctx.font='700 16px Outfit,sans-serif';
  ctx.textAlign='right';ctx.textBaseline='top';ctx.fillText('x',w-pad.r-4,my(0)+5);
  ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('y',mx(0)+8,pad.t);
  // Three parabolas: 2 solutions, 1 solution, 0 solutions
  // f1: x^2-4x+3 = (x-1)(x-3), nollst: 1,3
  // f2: x^2-4x+4 = (x-2)^2, nollst: 2 (nuddar)
  // f3: x^2-4x+5, inga nollst
  var fns=[
    {fn:function(x){return x*x-4*x+3},label:'2 l\u00f6sningar',lx:4.8,ly:0.5},
    {fn:function(x){return x*x-4*x+4},label:'1 l\u00f6sning',lx:4.8,ly:2.2},
    {fn:function(x){return x*x-4*x+5},label:'0 l\u00f6sningar',lx:4.8,ly:4.2}
  ];
  fns.forEach(function(f,i){
    ctx.strokeStyle=colors[i];ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.beginPath();var first=true;
    for(var t=-1;t<=5.5;t+=0.02){
      var yv=f.fn(t);var px=mx(t),py=my(yv);
      if(py<pad.t-5||py>h-pad.b+5){first=true;continue}
      if(first){ctx.moveTo(px,py);first=false}else ctx.lineTo(px,py);
    }
    ctx.stroke();
    // Label
    ctx.fillStyle=colors[i];ctx.font='700 13px Outfit,sans-serif';
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(f.label,mx(f.lx),my(f.ly));
  });
  // Mark nollställen for f1
  [{x:1},{x:3}].forEach(function(p){
    var px=mx(p.x),py=my(0);
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(px,py,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=colors[0];ctx.beginPath();ctx.arc(px,py,3.5,0,Math.PI*2);ctx.fill();
  });
  // Mark nuddar-punkt for f2
  var nx=mx(2),ny=my(0);
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(nx,ny,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=colors[1];ctx.beginPath();ctx.arc(nx,ny,3.5,0,Math.PI*2);ctx.fill();
}

// ═══════════════════
//  CONCEPT LINK TOOLTIPS
// ═══════════════════
const tip=document.createElement('div');
tip.className='clink-tip';document.body.appendChild(tip);
let tipTimer=null;

function posTip(cl){
  const to=cl.dataset.to;const n=N[to];if(!n)return;
  clearTimeout(tipTimer);
  tip.innerHTML=`<span class="tip-icon">\u2197</span><span class="tip-title">${n.title}</span><span class="tip-hint">Klicka f\u00f6r att utforska</span>`;
  tip.classList.add('show');
  requestAnimationFrame(()=>{
    const r=cl.getBoundingClientRect();
    const tw=tip.offsetWidth,th=tip.offsetHeight;
    let left=r.left+(r.width-tw)/2;
    left=Math.max(8,Math.min(left,window.innerWidth-tw-8));
    let top=r.top-th-10;
    if(top<8)top=r.bottom+10;
    tip.style.left=left+'px';tip.style.top=top+'px';
  });
}
document.addEventListener('mouseover',e=>{
  const cl=e.target.closest('.clink');if(!cl)return;
  clearTimeout(tipTimer);posTip(cl);
});
document.addEventListener('mouseout',e=>{
  if(!e.target.closest('.clink'))return;
  tipTimer=setTimeout(()=>tip.classList.remove('show'),120);
});
document.addEventListener('click',e=>{
  const cl=e.target.closest('.clink');if(!cl)return;
  e.preventDefault();e.stopPropagation();
  tip.classList.remove('show');go(cl.dataset.to);
});

window.addEventListener('load',()=>renderMath());
